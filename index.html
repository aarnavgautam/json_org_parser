<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UF Organizations Directory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface-hover: #243044;
      --border: #2d3a4d;
      --text: #e6edf3;
      --text-muted: #8b9eb5;
      --accent: #58a6ff;
      --accent-dim: #388bfd66;
      --success: #3fb950;
      --tag: #21262d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 1.25rem; font-weight: 600; }
    .header p { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.25rem; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .toolbar .search { flex: 1; min-width: 200px; }
    .toolbar input, .toolbar select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      font-size: 0.875rem;
    }
    .toolbar input:focus, .toolbar select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .positions-panel {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
    }
    .positions-panel h3 { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .position-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }
    .position-checkboxes label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
      font-size: 0.875rem;
    }
    .position-checkboxes input { accent-color: var(--accent); }
    .position-actions { margin-left: 0.5rem; }
    .position-actions button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      margin-right: 0.25rem;
    }
    .position-actions button:hover { color: var(--accent); border-color: var(--accent); }

    .event-panel {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
    }
    .event-panel details summary {
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text-muted);
      user-select: none;
    }
    .event-panel details[open] summary { margin-bottom: 0.75rem; }
    .event-panel textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
    }
    .event-panel textarea:focus { outline: none; border-color: var(--accent); }
    .event-panel textarea::placeholder { color: var(--text-muted); opacity: 0.7; }
    .event-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .relevance-stars {
      display: inline-flex;
      gap: 2px;
      margin-left: 0.5rem;
      font-size: 0.9rem;
      color: #e3b341;
    }
    .relevance-stars .star { opacity: 0.3; }
    .relevance-stars .star.filled { opacity: 1; }
    .relevance-badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      margin-left: 0.35rem;
      background: var(--tag);
      color: var(--text-muted);
    }
    .relevance-badge.high { background: #23863633; color: var(--success); }
    .relevance-badge.med { background: var(--accent-dim); color: var(--accent); }

    .actions-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .actions-bar .selected-count { color: var(--text-muted); font-size: 0.875rem; }
    .btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
      font-weight: 500;
    }
    .btn:hover { opacity: 0.9; }
    .btn-outline {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .btn-outline:hover { background: var(--accent-dim); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .content { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
    .results-meta-row { display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1rem; }
    .relevance-sort-row { display: flex; align-items: center; gap: 0.5rem; }
    .relevance-sort-row select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.35rem 0.5rem; border-radius: 4px; font-size: 0.8rem; }
    .btn-link { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; padding: 0 0.25rem; }
    .btn-link:hover { color: var(--accent); }

    .org-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }
    .org-card:hover { border-color: var(--accent); }
    .org-card.selected { border-color: var(--accent); background: var(--accent-dim); }
    .org-checkbox { flex-shrink: 0; margin-top: 0.2rem; accent-color: var(--accent); cursor: pointer; }
    .org-main { flex: 1; min-width: 0; }
    .org-name { font-weight: 600; font-size: 1rem; margin-bottom: 0.25rem; }
    .org-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .org-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.5rem; }
    .tag {
      background: var(--tag);
      color: var(--text-muted);
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }
    .tag.innovation-strong { background: #23863633; color: var(--success); }
    .tag.roundtable { background: var(--accent-dim); color: var(--accent); }
    .org-tracking {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
      font-size: 0.8rem;
    }
    .org-tracking .response-flag {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
    }
    .org-tracking .response-flag input { accent-color: var(--success); cursor: pointer; }
    .org-tracking .outreach-count {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .org-tracking .outreach-count button {
      background: var(--tag);
      border: 1px solid var(--border);
      color: var(--text);
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
    }
    .org-tracking .outreach-count button:hover { background: var(--surface-hover); }
    .contacts { font-size: 0.8rem; border-top: 1px solid var(--border); padding-top: 0.5rem; }
    .contact { display: flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0; }
    .contact-position { color: var(--text-muted); min-width: 120px; }
    .contact-email { color: var(--accent); text-decoration: none; }
    .contact-email:hover { text-decoration: underline; }
    .loading, .error { text-align: center; padding: 3rem; color: var(--text-muted); }
    .error { color: #f85149; }

    .api-base { display: none; }
  </style>
</head>
<body>
  <script>
    window.API_BASE = window.location.origin;
  </script>
  <header class="header">
    <h1>UF Organizations Directory</h1>
    <p>Search, filter, select orgs, export contacts, track outreach <button type="button" class="btn-link" id="tracking-info-btn" title="About tracking">ℹ️</button></p>
  </header>

  <div class="event-panel">
    <details>
      <summary>Paste event details to find relevant organizations</summary>
      <textarea id="event-details" placeholder="Paste your event description here... e.g. Innovation roundtable for design and tech clubs, networking for entrepreneurs..." rows="4"></textarea>
      <div class="event-actions">
        <button type="button" class="btn" id="match-event-btn">Find relevant orgs</button>
        <button type="button" class="btn btn-outline" id="clear-event-btn">Clear & show all</button>
      </div>
    </details>
  </div>

  <div class="toolbar">
    <div class="search">
      <input type="text" id="search" placeholder="Search org name or description..." style="width:100%">
    </div>
    <select id="innovation_fit"><option value="">Innovation: Any</option></select>
    <select id="category"><option value="">Category: Any</option></select>
    <input type="text" id="custom" placeholder="Custom keywords..." style="width:160px">
  </div>

  <div class="positions-panel">
    <h3>Include positions in results & export</h3>
    <div class="position-checkboxes">
      <label><input type="checkbox" id="pos-president" value="president"> President</label>
      <label><input type="checkbox" id="pos-vp" value="vice president"> Vice President</label>
      <label><input type="checkbox" id="pos-recruit" value="recruitment/outreach"> Recruitment/Outreach</label>
      <label><input type="checkbox" id="pos-other" value="other"> Other</label>
      <span class="position-actions">
        <button type="button" id="pos-select-all">Select all</button>
        <button type="button" id="pos-deselect-all">Deselect all</button>
      </span>
    </div>
  </div>

  <div class="actions-bar">
    <span class="selected-count" id="selected-count">0 selected</span>
    <button type="button" class="btn btn-outline" id="select-all">Select all visible</button>
    <button type="button" class="btn btn-outline" id="deselect-all">Deselect all</button>
    <button type="button" class="btn" id="export-btn" disabled>Export selected to CSV</button>
  </div>

  <main class="content">
    <div class="results-meta-row">
      <span id="meta"></span>
      <span id="relevance-sort-row" class="relevance-sort-row" style="display:none">
        <label>Sort by relevance:</label>
        <select id="relevance-sort">
          <option value="desc">High → Low</option>
          <option value="asc">Low → High</option>
        </select>
        <button type="button" class="btn-link" id="relevance-help-btn" title="How relevance works">?</button>
      </span>
    </div>
    <div id="results"></div>
  </main>

  <script>
    const API = window.API_BASE || '';
    const STORAGE_KEY = 'uf-orgs-tracking';

    const searchEl = document.getElementById('search');
    const innovationEl = document.getElementById('innovation_fit');
    const categoryEl = document.getElementById('category');
    const customEl = document.getElementById('custom');
    const posPresident = document.getElementById('pos-president');
    const posVp = document.getElementById('pos-vp');
    const posRecruit = document.getElementById('pos-recruit');
    const posOther = document.getElementById('pos-other');
    const posSelectAll = document.getElementById('pos-select-all');
    const posDeselectAll = document.getElementById('pos-deselect-all');
    const selectAllBtn = document.getElementById('select-all');
    const deselectAllBtn = document.getElementById('deselect-all');
    const exportBtn = document.getElementById('export-btn');
    const selectedCountEl = document.getElementById('selected-count');
    const metaEl = document.getElementById('meta');
    const resultsEl = document.getElementById('results');

    let debounceTimer;
    let allOrgs = [];
    let selectedIds = new Set();
    let tracking = {};
    let eventRelevancy = {}; // { orgId: { stars: 1-3, score: 0-1 } }

    function debounce(fn, ms) {
      return () => { clearTimeout(debounceTimer); debounceTimer = setTimeout(fn, ms); };
    }

    function loadTracking() {
      fetch(`${API}/api/tracking`)
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(data => { tracking = data || {}; if (allOrgs.length) renderOrgs(); })
        .catch(() => {
          try {
            const s = localStorage.getItem(STORAGE_KEY);
            tracking = s ? JSON.parse(s) : {};
          } catch { tracking = {}; }
          if (allOrgs.length) renderOrgs();
        });
    }
    // Poll tracking every 30s so Google Sheet updates show live
    setInterval(loadTracking, 30000);

    function saveTracking() {
      fetch(`${API}/api/tracking`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(tracking)
      }).then(r => r.ok ? r.json() : Promise.reject())
        .then(data => { if (data) tracking = data; })
        .catch(() => {
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tracking)); } catch (_) {}
        });
    }

    function getPositionParam() {
      const checked = [posPresident, posVp, posRecruit, posOther].filter(c => c.checked).map(c => c.value);
      return checked.length === 0 || checked.length === 4 ? '' : checked.join(',');
    }

    const STOPWORDS = new Set('the a an and or but in on at to for of with by from as is was are were be been being have has had do does did will would could should may might must can'.split(' '));
    function extractKeywords(text) {
      if (!text || !text.trim()) return [];
      return text.toLowerCase()
        .replace(/[^a-z0-9\s]/g, ' ')
        .split(/\s+/)
        .filter(w => w.length >= 3 && !STOPWORDS.has(w));
    }

    function computeRelevancy(eventText, org) {
      const keywords = extractKeywords(eventText);
      if (!keywords.length) return { stars: 0, score: 0 };

      const name = (org.OrganizationName || '').toLowerCase();
      const desc = (org.OrganizationDescription || '').toLowerCase();
      const cats = (org.Categories || []).join(' ').toLowerCase();

      let score = 0;
      for (const kw of keywords) {
        if (name.includes(kw)) score += 3;
        if (cats.includes(kw)) score += 2;
        if (desc.includes(kw)) score += 1;
      }
      if (keywords.some(k => /innov/.test(k)) && (org.InnovationFit || '').toLowerCase() === 'strong') score += 2;
      if (keywords.some(k => /roundtable|round.table/.test(k)) && org.RoundtableRecommended === 'Yes') score += 1.5;

      const maxPossible = Math.max(1, keywords.length * 3 + 3);
      const normalized = Math.min(1, score / maxPossible);

      let stars = 1;
      if (normalized >= 0.45) stars = 2;
      if (normalized >= 0.65) stars = 3;

      return { stars, score: normalized };
    }

    let relevanceSortOrder = 'desc';

    function matchToEvent() {
      const eventText = document.getElementById('event-details').value.trim();
      if (!eventText) return;
      eventRelevancy = {};
      for (const org of allOrgs) {
        const oid = String(org.OrganizationId);
        eventRelevancy[oid] = computeRelevancy(eventText, org);
      }
      relevanceSortOrder = document.getElementById('relevance-sort')?.value || 'desc';
      sortByRelevancy();
      document.getElementById('relevance-sort-row').style.display = 'flex';
      metaEl.textContent = `${allOrgs.length} organizations, sorted by event relevance`;
      renderOrgs();
    }

    function sortByRelevancy() {
      if (!Object.keys(eventRelevancy).length) return;
      const mult = relevanceSortOrder === 'desc' ? -1 : 1;
      allOrgs.sort((a, b) => mult * ((eventRelevancy[String(a.OrganizationId)]?.score || 0) - (eventRelevancy[String(b.OrganizationId)]?.score || 0)));
    }

    function clearEventMatch() {
      document.getElementById('event-details').value = '';
      eventRelevancy = {};
      document.getElementById('relevance-sort-row').style.display = 'none';
      fetchOrgs();
    }

    function fetchFilters() {
      fetch(`${API}/api/filters`).then(r => r.json()).then(data => {
        data.innovation_fits.forEach(fit => {
          const o = document.createElement('option'); o.value = fit; o.textContent = fit; innovationEl.appendChild(o);
        });
        data.categories.forEach(cat => {
          const o = document.createElement('option'); o.value = cat; o.textContent = cat; categoryEl.appendChild(o);
        });
      });
    }

    function fetchOrgs() {
      const params = new URLSearchParams();
      const search = searchEl.value.trim();
      const position = getPositionParam();
      const innovation = innovationEl.value.trim();
      const category = categoryEl.value.trim();
      const custom = customEl.value.trim();
      if (search) params.set('search', search);
      if (position) params.set('position', position);
      if (innovation) params.set('innovation_fit', innovation);
      if (category) params.set('category', category);
      if (custom) params.set('custom_filter', custom);

      resultsEl.innerHTML = '<div class="loading">Loading...</div>';

      fetch(`${API}/api/organizations?${params}`)
        .then(r => r.json())
        .then(data => {
          allOrgs = data.organizations;
          metaEl.textContent = `${data.total} organization${data.total !== 1 ? 's' : ''} found`;
          renderOrgs();
        })
        .catch(() => { resultsEl.innerHTML = '<div class="error">Failed to load data.</div>'; });
    }

    function renderOrgs() {
      if (!allOrgs.length) {
        resultsEl.innerHTML = '<div class="loading">No organizations match your filters.</div>';
        updateExportState();
        return;
      }
      resultsEl.innerHTML = allOrgs.map(org => {
        const oid = String(org.OrganizationId);
        const t = tracking[oid] || { gotResponse: false, outreachCount: 0 };
        const tags = [...(org.Categories || [])];
        if (org.InnovationFit) tags.push(`Innovation: ${org.InnovationFit}`);
        if (org.RoundtableRecommended === 'Yes') tags.push('Roundtable ✓');
        const officers = (org.Officers || []).filter(o => o.Email);
        const checked = selectedIds.has(oid) ? 'checked' : '';
        const rel = eventRelevancy[oid];
        const starsHtml = rel ? `<span class="relevance-stars" title="Relevance: ${rel.stars}/3"><span class="star ${rel.stars>=1?'filled':''}">★</span><span class="star ${rel.stars>=2?'filled':''}">★</span><span class="star ${rel.stars>=3?'filled':''}">★</span></span><span class="relevance-badge ${rel.stars>=2?'high':rel.stars>=1?'med':''}">${rel.stars===3?'High':rel.stars===2?'Medium':'Low'} match</span>` : '';
        return `
          <article class="org-card ${checked ? 'selected' : ''}" data-org-id="${escapeHtml(oid)}">
            <input type="checkbox" class="org-checkbox" ${checked} data-org-id="${escapeHtml(oid)}" aria-label="Select">
            <div class="org-main">
              <div class="org-name">${escapeHtml(org.OrganizationName)}${starsHtml}</div>
              ${org.OrganizationDescription ? `<div class="org-desc">${escapeHtml(org.OrganizationDescription)}</div>` : ''}
              <div class="org-tags">
                ${tags.map(tag => `<span class="tag ${tag.includes('Strong') ? 'innovation-strong' : ''} ${tag.includes('Roundtable') ? 'roundtable' : ''}">${escapeHtml(tag)}</span>`).join('')}
              </div>
              <div class="org-tracking">
                <label class="response-flag">
                  <input type="checkbox" data-org-id="${escapeHtml(oid)}" data-action="response" ${t.gotResponse ? 'checked' : ''}>
                  Got response
                </label>
                <div class="outreach-count">
                  <span>Reached out:</span>
                  <button type="button" data-org-id="${escapeHtml(oid)}" data-action="decr">−</button>
                  <span data-org-id="${escapeHtml(oid)}" class="outreach-num">${t.outreachCount}</span>
                  <button type="button" data-org-id="${escapeHtml(oid)}" data-action="incr">+</button>
                </div>
              </div>
              <div class="contacts">
                ${officers.map(o => `<div class="contact"><span class="contact-position">${escapeHtml(o.Position || '')}</span><a class="contact-email" href="mailto:${escapeHtml(o.Email || '')}">${escapeHtml(o.Email || '')}</a></div>`).join('')}
              </div>
            </div>
          </article>
        `;
      }).join('');

      resultsEl.querySelectorAll('.org-checkbox').forEach(cb => {
        cb.addEventListener('change', () => toggleSelect(cb.dataset.orgId, cb.checked));
      });
      resultsEl.querySelectorAll('.org-card').forEach(card => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.org-checkbox') || e.target.closest('a') || e.target.closest('button') || e.target.closest('input[type=checkbox]')) return;
          const id = card.dataset.orgId;
          const newSel = !selectedIds.has(id);
          toggleSelect(id, newSel);
          const cb = card.querySelector('.org-checkbox');
          if (cb) cb.checked = newSel;
          card.classList.toggle('selected', newSel);
        });
      });
      resultsEl.querySelectorAll('[data-action="response"]').forEach(cb => {
        cb.addEventListener('change', () => {
          const id = cb.dataset.orgId;
          if (!tracking[id]) tracking[id] = { gotResponse: false, outreachCount: 0 };
          tracking[id].gotResponse = cb.checked;
          saveTracking();
        });
      });
      resultsEl.querySelectorAll('.outreach-count button[data-action="incr"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.orgId;
          if (!tracking[id]) tracking[id] = { gotResponse: false, outreachCount: 0 };
          tracking[id].outreachCount = (tracking[id].outreachCount || 0) + 1;
          saveTracking();
          const span = resultsEl.querySelector(`.outreach-num[data-org-id="${id}"]`);
          if (span) span.textContent = tracking[id].outreachCount;
        });
      });
      resultsEl.querySelectorAll('.outreach-count button[data-action="decr"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.orgId;
          if (!tracking[id]) tracking[id] = { gotResponse: false, outreachCount: 0 };
          tracking[id].outreachCount = Math.max(0, (tracking[id].outreachCount || 0) - 1);
          saveTracking();
          const span = resultsEl.querySelector(`.outreach-num[data-org-id="${id}"]`);
          if (span) span.textContent = tracking[id].outreachCount;
        });
      });

      updateExportState();
    }

    function toggleSelect(oid, add) {
      if (add) selectedIds.add(oid); else selectedIds.delete(oid);
      selectedCountEl.textContent = `${selectedIds.size} selected`;
      const card = resultsEl.querySelector(`.org-card[data-org-id="${oid}"]`);
      const cb = resultsEl.querySelector(`.org-checkbox[data-org-id="${oid}"]`);
      if (card) card.classList.toggle('selected', add);
      if (cb) cb.checked = add;
      updateExportState();
    }

    function updateExportState() {
      exportBtn.disabled = selectedIds.size === 0;
    }

    function escapeHtml(s) {
      const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML;
    }

    selectAllBtn.addEventListener('click', () => {
      allOrgs.forEach(org => selectedIds.add(String(org.OrganizationId)));
      selectedCountEl.textContent = `${selectedIds.size} selected`;
      renderOrgs();
    });
    deselectAllBtn.addEventListener('click', () => {
      selectedIds.clear();
      selectedCountEl.textContent = '0 selected';
      renderOrgs();
    });
    posSelectAll.addEventListener('click', () => {
      [posPresident, posVp, posRecruit, posOther].forEach(c => { c.checked = true; });
      fetchOrgs();
    });
    posDeselectAll.addEventListener('click', () => {
      [posPresident, posVp, posRecruit, posOther].forEach(c => { c.checked = false; });
      fetchOrgs();
    });
    [posPresident, posVp, posRecruit, posOther].forEach(c => {
      c.addEventListener('change', () => fetchOrgs());
    });

    exportBtn.addEventListener('click', () => {
      if (selectedIds.size === 0) return;
      const positions = [posPresident, posVp, posRecruit, posOther].filter(c => c.checked).map(c => c.value);
      const body = JSON.stringify({ orgIds: [...selectedIds], positions: positions.length === 0 || positions.length === 4 ? ['all'] : positions });
      fetch(`${API}/api/export`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body })
        .then(r => r.blob())
        .then(blob => {
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'org_contacts_export.csv';
          a.click();
          URL.revokeObjectURL(a.href);
        });
    });

    document.getElementById('match-event-btn').addEventListener('click', matchToEvent);
    document.getElementById('clear-event-btn').addEventListener('click', clearEventMatch);

    document.getElementById('relevance-sort')?.addEventListener('change', (e) => {
      relevanceSortOrder = e.target.value;
      if (Object.keys(eventRelevancy).length) {
        sortByRelevancy();
        renderOrgs();
      }
    });

    document.getElementById('tracking-info-btn')?.addEventListener('click', () => {
      alert(`Got response / Reached out tracking:\n\n• Google Sheet: Set GOOGLE_SHEET_TRACKING_URL in Vercel. Edit the sheet manually; data refreshes every 30s.\n• Vercel KV: Syncs team-wide when configured. See README.\n• Otherwise: stored in this browser only.`);
    });

    document.getElementById('relevance-help-btn')?.addEventListener('click', () => {
      alert(`How relevance scoring works:\n\n• Keywords are extracted from your event text (words 3+ chars, excluding common words like "the", "and").\n• Each org is scored by keyword matches:\n  - In org name: +3 pts each\n  - In categories (Design, Tech, etc.): +2 pts each\n  - In description: +1 pt each\n• Bonus: +2 if event mentions "innovation" and org has Strong innovation fit\n• Bonus: +1.5 if event mentions "roundtable" and org is roundtable recommended\n• Score is normalized to 0-1, then mapped to 1-3 stars (0.65+ = 3★, 0.45+ = 2★, else 1★)\n\nAccuracy: This is keyword-based, not AI. It works best when event text uses concrete terms (design, tech, entrepreneur, etc.). Spot-check high vs low relevance orgs to validate.`);
    });

    [searchEl, innovationEl, categoryEl, customEl].forEach(el => {
      if (el === searchEl || el === customEl) el.addEventListener('input', debounce(fetchOrgs, 300));
      else el.addEventListener('change', fetchOrgs);
    });

    loadTracking();
    fetchFilters();
    fetchOrgs();
  </script>
</body>
</html>
